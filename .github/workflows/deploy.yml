name: Deploy Laravel API

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps: 
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build Docker image
        run: docker build -t linkrojo/api-biblioteca:latest .

      - name: Push Docker image
        run: docker push linkrojo/api-biblioteca:latest
      
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker rm -f $(sudo docker ps -aq) || true
            sudo docker network rm api-network || true
            sudo docker network create api-network

            sudo docker pull linkrojo/api-biblioteca:latest
            
            sudo docker run -d --name db --network api-network -e MYSQL_ROOT_PASSWORD=root -e MYSQL_DATABASE=api_biblioteca mysql:8.0
            
            sleep 20

            sudo docker run -d --name api-biblioteca-app --network api-network -p 8000:8000 -e DB_CONNECTION=mysql -e DB_HOST=db -e DB_PORT=3306 -e DB_DATABASE=api_biblioteca -e DB_USERNAME=root -e DB_PASSWORD=root linkrojo/api-biblioteca:latest

            sleep 10

            sudo docker exec api-biblioteca-app php artisan migrate --force